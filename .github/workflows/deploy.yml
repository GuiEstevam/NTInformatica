name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          echo "=== INICIANDO BUILD ==="
          echo "NODE_ENV: $NODE_ENV"
          echo "Base path configurado: /NTInformatica/"
          npm run build
          echo "=== BUILD CONCLUÍDO ==="
        env:
          NODE_ENV: production

      - name: Debug - List all dist files
        run: |
          echo "=== ESTRUTURA COMPLETA DO DIST ==="
          find dist -type f | sort
          echo ""
          echo "=== VERIFICANDO JS ==="
          ls -la dist/js/ 2>&1 || echo "Pasta js não encontrada"
          echo ""
          echo "=== VERIFICANDO ASSETS ==="
          ls -la dist/assets/ 2>&1 || echo "Pasta assets não encontrada"
          echo ""
          echo "=== VERIFICANDO HTMLs ==="
          ls -la dist/*.html 2>&1

      - name: Debug - Check HTML asset paths
        run: |
          echo "=== VERIFICANDO CAMINHOS NO INDEX.HTML ==="
          echo "CSS:"
          grep -o 'href="[^"]*\.css[^"]*"' dist/index.html || echo "Nenhum CSS encontrado"
          echo ""
          echo "JS:"
          grep -o 'src="[^"]*\.js[^"]*"' dist/index.html || echo "Nenhum JS encontrado"
          echo ""
          echo "Dark mode init:"
          grep -i "dark-mode" dist/index.html || echo "Dark mode init não encontrado"
          echo ""
          echo "=== PRIMEIRAS 20 LINHAS DO INDEX.HTML ==="
          head -20 dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

